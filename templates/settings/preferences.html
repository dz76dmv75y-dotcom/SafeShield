{% extends 'base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-lg p-4">
      <h2 class="mb-3">Security settings</h2>
      <p class="text-secondary">Adjust protection preferences, scan cadence, notification behavior, and your preferred security defaults.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Save Preferences</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
