{% extends 'base.html' %}
{% block title %}Choose a new password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-0 shadow-lg p-4">
      <h2 class="mb-3">Choose a new password</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success w-100" type="submit">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
